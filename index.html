<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Research Landscape</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0e1a;
    color: #e0e4ef;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(10,14,26,0.95) 0%, rgba(10,14,26,0) 100%);
    pointer-events: none;
  }
  #header > * { pointer-events: auto; }

  #header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #f472b6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #header .subtitle {
    font-size: 12px;
    color: #64748b;
    font-weight: 400;
    margin-top: 2px;
  }

  #legend {
    display: flex;
    gap: 20px;
    align-items: center;
    font-size: 12px;
    color: #94a3b8;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .legend-dot.solved { background: #34d399; box-shadow: 0 0 6px rgba(52,211,153,0.4); }
  .legend-dot.partial { background: #fbbf24; box-shadow: 0 0 6px rgba(251,191,36,0.4); }
  .legend-dot.unsolved { background: #f87171; box-shadow: 0 0 6px rgba(248,113,113,0.4); }
  .legend-dot.category { background: #60a5fa; box-shadow: 0 0 6px rgba(96,165,250,0.4); }

  #graph-container {
    width: 100vw;
    height: 100vh;
  }

  svg {
    width: 100%;
    height: 100%;
  }

  /* Info panel */
  #info-panel {
    position: fixed;
    right: 0;
    top: 0;
    width: 400px;
    height: 100vh;
    background: rgba(15,20,35,0.97);
    border-left: 1px solid rgba(100,116,139,0.2);
    backdrop-filter: blur(20px);
    overflow: hidden;
    transform: translateX(110%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), width 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 200;
  }
  #info-panel.open { transform: translateX(0); }
  #panel-scroll { height: 100%; overflow-y: auto; padding: 28px; }
  @keyframes panelFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  #panel-content.fade { animation: panelFade 0.28s ease; }

  #info-panel .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid rgba(100,116,139,0.3);
    background: rgba(30,41,59,0.5);
    color: #94a3b8;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
    z-index: 5;
  }
  #info-panel .close-btn:hover {
    background: rgba(51,65,85,0.8);
    color: #e2e8f0;
  }

  #info-panel .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .status-badge.solved { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
  .status-badge.partial { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
  .status-badge.unsolved { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
  .status-badge.category-badge { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.3); }

  #info-panel h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  #info-panel .description {
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.6;
    margin-bottom: 20px;
  }

  #info-panel h3 {

    font-weight: 600;

  .paper-item .paper-title { color: #e2e8f0; font-weight: 500; }

  .paper-links a {

  .detail-actions a {

<body>

<div id="header">
  <div>
    <h1>Interactive Research Landscape</h1>
    <div class="subtitle">Proton-Driven Plasma Wakefield Acceleration &mdash; BINP &amp; AWAKE publications</div>
  </div>
  <div id="legend">
    <div class="legend-item"><div class="legend-dot solved"></div> Well understood</div>
    <div class="legend-item"><div class="legend-dot partial"></div> Partially solved</div>
    <div class="legend-item"><div class="legend-dot unsolved"></div> Open problem</div>
    <div class="legend-item"><div class="legend-dot category"></div> Category</div>
  </div>
</div>

<div id="graph-container"></div>

<div id="search">
  <input id="search-input" type="text" placeholder="Search topics, authors… (try 'first author: Lotov')" autocomplete="off" spellcheck="false" />
  <div id="search-results"></div>
</div>

<div id="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="theory">Theory</button>
  <button class="filter-btn" data-filter="experiment">Experiment</button>
  <button class="filter-btn" data-filter="simulation">Simulation</button>
  <button class="filter-btn" data-filter="unsolved">Open Problems</button>
  <button class="filter-btn" data-filter="my">My Papers</button>
  <div style="width:1px;height:20px;background:rgba(100,116,139,0.3);margin:0 4px"></div>
  <button class="filter-btn layout-toggle" id="layout-toggle">Tree View</button>
</div>

<div id="info-panel">
  <button class="close-btn" onclick="closePanel()">&times;</button>
  <div id="panel-scroll"><div id="panel-content"></div></div>
</div>

<div class="tooltip" id="tooltip"></div>

<div id="pdf-overlay">
  <div class="po-bar">
    <span id="po-title"></span>
    <a id="po-open" target="_blank" rel="noopener">Open on arXiv ↗</a>
    <button id="po-close" title="Close">&times;</button>
  </div>
  <iframe id="po-frame" title="PDF preview"></iframe>
</div>

<div id="fig-lightbox">
  <button id="fig-close" title="Close">&times;</button>
  <div class="fl-inner">
    <img alt="figure">
    <div id="fig-caption"></div>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="papers.js"></script>
<script src="topics.js"></script>
<script>
// ============================================================
// Data preparation
// ============================================================

// Rank = shortest directed path (following sources upward) to a rank-0 node.
// BFS from rank-0 roots along source->child edges.
function computeRanks(nodes) {
  const children = new Map(nodes.map(n => [n.id, []]));
  for (const n of nodes) {
    for (const s of n.sources || []) children.get(s.id)?.push(n.id);
  }
  // Roots (rank 0) = nodes with no incoming links (no sources). Rank is then
  // the shortest distance from a root — derived purely from the link structure.
  const rank = {};
  const queue = [];
  for (const n of nodes) {
    if (!n.sources || n.sources.length === 0) { rank[n.id] = 0; queue.push(n.id); }
  }
  for (let i = 0; i < queue.length; i++) {
    const r = rank[queue[i]];
    for (const c of children.get(queue[i]) || []) {
      if (!(c in rank)) { rank[c] = r + 1; queue.push(c); }
    }
  }
  const maxR = Math.max(0, ...Object.values(rank));
  for (const n of nodes) {
    if (!(n.id in rank)) {
      console.warn(`Disconnected node (no path to rank 0): ${n.id}`);
      rank[n.id] = maxR + 1;
    }
  }
  return rank;
}

const rankToSize = rank => 36 / (1 + 0.4 * rank);
// Size grows with rank (base) and with how many child bubbles link to it.
const nodeSize = (rank, childCount) => rankToSize(rank) + 3.5 * Math.sqrt(childCount || 0);

let data = { nodes: [], links: [] };
let nodeById = new Map();
let incoming = new Map();   // parents: who points to me
let outgoing = new Map();   // children: who I point to

// Re-derive data + adjacency from topics/papers (re-run after edits).
// Preserves existing node positions by id so edits don't reshuffle the layout.
function deriveData() {
  const prev = new Map(data.nodes.map(n => [n.id, n]));
  const ranks = computeRanks(topics);
  // Count how many bubbles link to each node (its children).
  const childCount = {};
  for (const t of topics) for (const s of t.sources || []) childCount[s.id] = (childCount[s.id] || 0) + 1;
  data.nodes = topics.map(t => {
    const r = ranks[t.id];
    const n = {
      ...t,
      rank: r,
      type: r <= 1 ? "category" : "topic",
      size: nodeSize(r, childCount[t.id]),
      papers: (t.paperIds || []).map(id => papers[id]).filter(Boolean),
    };
    const old = prev.get(t.id);
    if (old) {
      n.x = old.x; n.y = old.y; n.vx = old.vx; n.vy = old.vy; n.fx = old.fx; n.fy = old.fy;
    } else {
      // Seed new nodes near their target (centered column, rank row) so they
      // appear centered rather than spiraling out from the origin.
      n.x = (Math.random() - 0.5) * 160;
      n.y = r * RANK_ROW;
    }
    // Pin rank-0 roots to a fixed height (free in x) so they stay level.
    if (r === 0) { n.fy = r * RANK_ROW; if (n.y == null) n.y = n.fy; }
    return n;
  });
  data.links = topics.flatMap(t =>
    (t.sources || []).map(s => ({ source: s.id, target: t.id, type: s.type }))
  );
  nodeById = new Map(data.nodes.map(n => [n.id, n]));
  incoming = new Map(data.nodes.map(n => [n.id, []]));
  outgoing = new Map(data.nodes.map(n => [n.id, []]));
  data.links.forEach(l => {
    incoming.get(l.target)?.push({ id: l.source, type: l.type });
    outgoing.get(l.source)?.push({ id: l.target, type: l.type });
  });
}

// Helpers shared across pre/post-simulation link representations.
const linkSrcId = l => (typeof l.source === "object" ? l.source.id : l.source);
const linkTgtId = l => (typeof l.target === "object" ? l.target.id : l.target);
const labelText = d => d.label.replace(/\n/g, " ");

// ============================================================
// Rendering setup
// ============================================================

const statusColors = {
  solved: "#34d399",
  partial: "#fbbf24",
  unsolved: "#f87171",
  category: "#60a5fa"
};

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("#graph-container")
  .append("svg")
  .attr("width", width)
  .attr("height", height);

const defs = svg.append("defs");

// Single soft-glow filter, applied only to category nodes (few of them).
const glow = defs.append("filter")
  .attr("id", "glow")
  .attr("x", "-50%").attr("y", "-50%")
  .attr("width", "200%").attr("height", "200%");
glow.append("feGaussianBlur").attr("stdDeviation", 4).attr("result", "blur");
const glowMerge = glow.append("feMerge");
glowMerge.append("feMergeNode").attr("in", "blur");
glowMerge.append("feMergeNode").attr("in", "SourceGraphic");

// Zoom
const g = svg.append("g");
const zoom = d3.zoom()
  .scaleExtent([0.3, 4])
  .on("zoom", (event) => g.attr("transform", event.transform));
svg.call(zoom);
// Start with x=0 (the layout's center column) at the horizontal screen center,
// rank-0 near the top — so bubbles appear centered before fitToView refines.
svg.call(zoom.transform, d3.zoomIdentity.translate(width / 2, 150).scale(0.8));

// ============================================================
// Force layout configuration (single source of truth)
// ============================================================

function linkDistance(l) {
  const s = nodeById.get(linkSrcId(l));
  const t = nodeById.get(linkTgtId(l));
  return (s ? s.size : 14) + (t ? t.size : 14) + 85;
}

function centerInGraphSpace() {
  const t = d3.zoomTransform(svg.node());
  return t.invert([window.innerWidth / 2, window.innerHeight / 2]);
}

// Layout lives in a fixed coordinate system (independent of zoom): bigger
// (lower-rank) bubbles toward the top via y = rank * ROW, centered on x = 0.
// fitToView() then sets the zoom so the whole graph sits below the search bar.
const RANK_ROW = 155;

function applyForceLayout() {
  simulation
    .force("treeX", null)
    .force("treeY", null)
    .force("bounds", null)
    .force("center", null)
    .force("link", d3.forceLink(data.links).id(d => d.id).distance(linkDistance))
    // Stronger repulsion, scaled by bubble size, so the graph is less dense.
    .force("charge", d3.forceManyBody().strength(d => -(300 + d.size * 32)))
    .force("collision", d3.forceCollide().radius(d => d.size + 28))
    .force("x", d3.forceX(0).strength(0.07))
    // Deeper ranks float gently toward their row; rank-0 is pinned via fy.
    .force("y", d3.forceY(d => d.rank * RANK_ROW).strength(0.16));
}

// Set the zoom so all bubbles fit in the area below the search bar.
const FIT = { padX: 50, top: 130, bottom: 80, maxScale: 1.5, minScale: 0.3 };
function fitToView(duration = 700) {
  if (!data.nodes.length) return;
  let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
  for (const n of data.nodes) {
    if (n.x == null) continue;
    x0 = Math.min(x0, n.x - n.size); x1 = Math.max(x1, n.x + n.size);
    y0 = Math.min(y0, n.y - n.size); y1 = Math.max(y1, n.y + n.size);
  }
  if (!isFinite(x0)) return;
  const bw = (x1 - x0) || 1, bh = (y1 - y0) || 1;
  const availW = Math.max(120, window.innerWidth - 2 * FIT.padX);
  const availH = Math.max(120, window.innerHeight - FIT.top - FIT.bottom);
  const scale = Math.max(FIT.minScale, Math.min(availW / bw, availH / bh, FIT.maxScale));
  const tx = FIT.padX + (availW - bw * scale) / 2 - x0 * scale;
  const ty = FIT.top + (availH - bh * scale) / 2 - y0 * scale;
  svg.transition().duration(duration).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

let fitTimer = null;
function scheduleFit(delay) {
  clearTimeout(fitTimer);
  fitTimer = setTimeout(() => { if (currentLayout === "force") fitToView(); }, delay);
}

const simulation = d3.forceSimulation([]);

// ============================================================
// Link styling helpers
// ============================================================

function baseLinkStroke() { return "rgba(100,116,139,0.15)"; }
function baseLinkWidth() { return 1.2; }

// ============================================================
// Render (re-run after edits). Persistent layers + keyed joins.
// ============================================================

const linkLayer = g.append("g");
const nodeLayer = g.append("g");
let link = linkLayer.selectAll("line");
let node = nodeLayer.selectAll("g.node");

function renderGraph() {
  link = linkLayer.selectAll("line")
    .data(data.links, d => linkSrcId(d) + "->" + linkTgtId(d))
    .join("line")
    .attr("stroke", baseLinkStroke())
    .attr("stroke-width", baseLinkWidth());

  node = nodeLayer.selectAll("g.node")
    .data(data.nodes, d => d.id)
    .join(enter => {
      const gsel = enter.append("g").attr("class", "node")
        .attr("cursor", "pointer").attr("opacity", 1);
      gsel.append("circle").attr("class", "glow-ring");
      gsel.append("circle").attr("class", "node-circle");
      return gsel;
    });

  // (Re)apply visuals to all nodes (covers edited status/size/label).
  node.select(".glow-ring")
    .attr("r", d => d.size + 3)
    .attr("fill", "none")
    .attr("stroke", d => statusColors[d.status])
    .attr("stroke-width", 1.5)
    .attr("stroke-opacity", d => d.status === "unsolved" ? 0.6 : 0.25);

  node.select(".node-circle")
    .attr("r", d => d.size)
    .attr("fill", d => {
      const c = statusColors[d.status];
      return d.type === "category" ? `rgba(${hexToRgb(c)}, 0.15)` : `rgba(${hexToRgb(c)}, 0.08)`;
    })
    .attr("stroke", d => statusColors[d.status])
    .attr("stroke-width", d => d.type === "category" ? 2 : 1.5)
    .attr("stroke-opacity", d => d.type === "category" ? 0.8 : 0.5)
    .attr("filter", d => d.type === "category" ? "url(#glow)" : null);

  node.each(function (d) {
    const el = d3.select(this);
    el.selectAll("text").remove();
    const lines = d.label.split("\n");
    lines.forEach((line, i) => {
      el.append("text")
        .attr("text-anchor", "middle")
        .attr("dy", `${(i - (lines.length - 1) / 2) * 1.15}em`)
        .attr("font-size", d.type === "category" ? "11px" : "9.5px")
        .attr("font-weight", d.type === "category" ? 600 : 500)
        .attr("fill", "#e2e8f0")
        .attr("pointer-events", "none")
        .text(line);
    });
  });

  node.call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));
  node.on("mouseenter", onNodeEnter)
      .on("mousemove", onNodeMove)
      .on("mouseleave", onNodeLeave)
      .on("click", onNodeClick);

  if (window.editor && window.editor.onRender) window.editor.onRender();
}

// ============================================================
// Hover / click interactions
// ============================================================

function onNodeEnter(event, d) {
  d3.select(this).select(".node-circle")
    .transition().duration(200)
    .attr("stroke-opacity", 1)
    .attr("stroke-width", d.type === "category" ? 3 : 2.5);

  const pathNodeIds = new Set();
  const pathLinkKeys = new Set();
  (function walkUp(id) {
    if (pathNodeIds.has(id)) return;
    pathNodeIds.add(id);
    for (const p of incoming.get(id) || []) {
      pathLinkKeys.add(p.id + "->" + id);
      walkUp(p.id);
    }
  })(d.id);
  (function walkDown(id) {
    for (const c of outgoing.get(id) || []) {
      if (!pathNodeIds.has(c.id)) {
        pathNodeIds.add(c.id);
        pathLinkKeys.add(id + "->" + c.id);
        walkDown(c.id);
      }
    }
  })(d.id);

  const isHighlighted = l => pathLinkKeys.has(linkSrcId(l) + "->" + linkTgtId(l));
  link.transition().duration(200)
    .attr("stroke", l => isHighlighted(l) ? "rgba(167,180,200,0.75)" : "rgba(100,116,139,0.06)")
    .attr("stroke-width", l => isHighlighted(l) ? 1 : baseLinkWidth() * 0.6);

  node.transition().duration(200)
    .attr("opacity", n => pathNodeIds.has(n.id) ? 1 : 0.2);

  const tooltip = document.getElementById("tooltip");
  tooltip.textContent = labelText(d);
  tooltip.style.left = (event.clientX + 16) + "px";
  tooltip.style.top = (event.clientY - 8) + "px";
  tooltip.style.opacity = 1;
}

function onNodeMove(event) {
  const tooltip = document.getElementById("tooltip");
  tooltip.style.left = (event.clientX + 16) + "px";
  tooltip.style.top = (event.clientY - 8) + "px";
}

function onNodeLeave() {
  d3.select(this).select(".node-circle")
    .transition().duration(300)
    .attr("stroke-opacity", d => d.type === "category" ? 0.8 : 0.5)
    .attr("stroke-width", d => d.type === "category" ? 2 : 1.5);
  applyFilter(300);
  document.getElementById("tooltip").style.opacity = 0;
}

function onNodeClick(event, d) {
  event.stopPropagation();
  // In edit mode the editor intercepts clicks (returns true to consume).
  if (window.editor && window.editor.onNodeClick && window.editor.onNodeClick(d, event)) return;
  showPanel(d);
}

// Pulse animation for unsolved nodes (ring only, no filter). Re-selects live
// nodes each cycle so it covers nodes added after an edit.
function pulseLoop() {
  nodeLayer.selectAll(".glow-ring")
    .filter(d => d.status === "unsolved")
    .transition()
    .duration(1500)
    .attr("stroke-opacity", 0.8)
    .attr("r", d => d.size + 8)
    .transition()
    .duration(1500)
    .attr("stroke-opacity", 0.2)
    .attr("r", d => d.size + 3)
    .on("end", pulseLoop);
}

// ============================================================
// Simulation tick + drag
// ============================================================

// Trim each link to the edges of its end bubbles so it doesn't run under them.
function trimLink(d) {
  const dx = d.target.x - d.source.x;
  const dy = d.target.y - d.source.y;
  const dist = Math.hypot(dx, dy) || 1;
  const ux = dx / dist, uy = dy / dist;
  return {
    x1: d.source.x + ux * (d.source.size + 1),
    y1: d.source.y + uy * (d.source.size + 1),
    x2: d.target.x - ux * (d.target.size + 1),
    y2: d.target.y - uy * (d.target.size + 1),
  };
}

function updatePositions() {
  link.each(d => { d.__p = trimLink(d); });
  link
    .attr("x1", d => d.__p.x1)
    .attr("y1", d => d.__p.y1)
    .attr("x2", d => d.__p.x2)
    .attr("y2", d => d.__p.y2);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
}
simulation.on("tick", updatePositions);

function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}
function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}
function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}

// ============================================================
// Info panel
// ============================================================

let panelNode = null;   // the topic currently shown, so the detailed view can go back

// Re-trigger the fade-in animation on the panel content each time it changes.
function fadePanel() {
  const c = document.getElementById("panel-content");
  c.classList.remove("fade");
  void c.offsetWidth;   // reflow so the animation restarts
  c.classList.add("fade");
}

function showPanel(d) {
  const panel = document.getElementById("info-panel");
  const content = document.getElementById("panel-content");
  panelNode = d;
  panel.classList.remove("detailed");

  const statusLabel = {solved: "Well Understood", partial: "Partially Solved", unsolved: "Open Problem", category: "Category"}[d.status];
  const badgeClass = d.status === "category" ? "category-badge" : d.status;

  let html = `
    <div class="status-badge ${badgeClass}">${statusLabel}</div>
    <h2>${labelText(d)}</h2>
    <div class="description">${d.description}</div>
  `;

  if (d.openQuestions) {
    html += `<h3>Open Questions</h3><div class="open-questions">${d.openQuestions}</div>`;
  }

  if (d.papers.length > 0) {
    html += `<h3>Key Publications</h3>`;
    d.papers.forEach(p => {
      let links = '<div class="paper-links">';
      if (p.doi) links += `<a class="doi-link" href="https://doi.org/${p.doi}" target="_blank" rel="noopener">DOI</a>`;
      if (p.arxiv) links += `<a class="arxiv-link" href="https://arxiv.org/abs/${p.arxiv}" target="_blank" rel="noopener">arXiv</a>`;
      if (p.arxiv) links += `<button class="preview-btn" data-preview="${p.arxiv}">Preview</button>`;
      links += '</div>';
      const ea = s => String(s || "").replace(/"/g, "&quot;");
      html += `<div class="paper-item paper-card" data-arxiv="${ea(p.arxiv)}" data-doi="${ea(p.doi)}" data-title="${ea(p.title)}" data-ref="${ea(p.ref)}">`
        + `<div class="paper-title">${p.title}</div><div class="paper-ref">${p.ref}</div>${links}</div>`;
    });
  }

  // Connections via adjacency maps.
  const connected = [
    ...(outgoing.get(d.id) || []).map(c => ({ node: nodeById.get(c.id), relation: c.type, direction: "→" })),
    ...(incoming.get(d.id) || []).map(p => ({ node: nodeById.get(p.id), relation: p.type, direction: "←" })),
  ].filter(c => c.node);

  if (connected.length > 0) {
    html += `<h3>Connections</h3>`;
    connected.forEach(c => {
      html += `<div class="connected-item" data-node-id="${c.node.id}">
        <div class="connected-dot" style="background:${statusColors[c.node.status]}"></div>
        ${c.direction} ${labelText(c.node)}
        <span style="color:#475569;margin-left:auto;font-size:10px">${c.relation.replace(/_/g, " ")}</span>
      </div>`;
    });
  }

  html += `<h3>Tags</h3><div style="display:flex;gap:4px;flex-wrap:wrap">`;
  d.tags.forEach(t => {
    html += `<span style="padding:2px 8px;background:rgba(51,65,85,0.5);border-radius:4px;font-size:11px;color:#94a3b8">${t}</span>`;
  });
  html += `</div>`;

  content.innerHTML = html;
  document.getElementById("panel-scroll").scrollTop = 0;
  fadePanel();
  content.querySelectorAll(".connected-item").forEach(el => {
    el.addEventListener("click", () => navigateToNode(el.dataset.nodeId));
  });
  content.querySelectorAll(".paper-card").forEach(el => {
    el.addEventListener("click", (e) => {
      if (e.target.closest("a")) return; // let DOI/arXiv links open normally
      const btn = e.target.closest(".preview-btn");
      if (btn) { e.stopPropagation(); openPdfOverlay(btn.dataset.preview); return; }
      openDetailed({ arxiv: el.dataset.arxiv, doi: el.dataset.doi, title: el.dataset.title, ref: el.dataset.ref });
    });
  });
  panel.classList.add("open");
}

function apiBase() {
  return (typeof CONFIG !== "undefined" && CONFIG.workerUrl) ? CONFIG.workerUrl.replace(/\/$/, "") : "";
}

// Detailed article view rendered INTO the side panel (Back returns to the topic).
async function openDetailed(p) {
  const panel = document.getElementById("info-panel");
  const content = document.getElementById("panel-content");
  const base = apiBase();
  panel.classList.add("detailed");
  document.getElementById("panel-scroll").scrollTop = 0;
  content.innerHTML = "";
  fadePanel();

  const el = (tag, cls, txt) => { const e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; };
  const link = (href, txt) => { const a = el("a", null, txt); a.href = href; a.target = "_blank"; a.rel = "noopener"; return a; };

  const back = el("button", "detail-back", "← Back");
  back.addEventListener("click", () => { if (panelNode) showPanel(panelNode); });
  content.appendChild(back);
  content.appendChild(el("h2", "detail-title", p.title || "Article"));
  const authors = el("div", "detail-authors"); content.appendChild(authors);
  content.appendChild(el("div", "detail-ref", p.ref || ""));

  const actions = el("div", "detail-actions");
  if (p.doi) actions.appendChild(link("https://doi.org/" + p.doi, "DOI ↗"));
  if (p.arxiv) actions.appendChild(link("https://arxiv.org/abs/" + p.arxiv, "arXiv ↗"));
  if (p.arxiv && base) {
    const b = el("button", "preview-btn-lg", "◳ Preview PDF");
    b.addEventListener("click", () => openPdfOverlay(p.arxiv));
    actions.appendChild(b);
  }
  content.appendChild(actions);

  content.appendChild(el("h3", null, "Summary"));
  const abs = el("p", "detail-abstract", "Loading…"); content.appendChild(abs);
  content.appendChild(el("h3", null, "Key Results"));
  const kr = el("div", "detail-keyresults", "Loading…"); content.appendChild(kr);
  const figH = el("h3", null, "Figures"); figH.style.display = "none"; content.appendChild(figH);
  const figs = el("div", "detail-figures"); content.appendChild(figs);

  if (!base) { abs.textContent = "Backend unavailable."; kr.textContent = "—"; return; }

  const apath = p.arxiv ? "/article/arxiv/" + encodeURIComponent(p.arxiv)
              : p.doi ? "/article/doi/" + encodeURIComponent(p.doi) : null;
  if (apath) {
    fetch(base + apath).then(r => r.json()).then(d => {
      abs.textContent = d.abstract || "No abstract available.";
      if (d.authors && d.authors.length) {
        const a = d.authors;
        authors.textContent = a.length > 10 ? a.slice(0, 8).join(", ") + " … +" + (a.length - 8) + " more" : a.join(", ");
      }
      if (d.figures && d.figures.length) {
        figH.style.display = "";
        d.figures.forEach((f, i) => {
          const url = typeof f === "string" ? f : f.url;
          const caption = typeof f === "string" ? "" : (f.caption || "");
          const im = document.createElement("img");
          im.src = url; im.loading = "lazy";
          im.alt = caption || ("Figure " + (i + 1));
          if (caption) im.title = caption;
          im.addEventListener("click", () => openFig(url, caption));
          figs.appendChild(im);
        });
      }
    }).catch(() => { abs.textContent = "Could not load article info."; });
  } else { abs.textContent = "No abstract available."; }

  if (p.arxiv) {
    kr.textContent = "Generating key results — first time can take up to ~1 min…";
    loadKeyResults(base, p.arxiv, kr, 0);
  } else { kr.textContent = "Key results are available for arXiv papers."; }
}

// Fetch key results; if the server is busy generating another, retry a few times.
function loadKeyResults(base, arxiv, kr, attempt) {
  fetch(base + "/article/keyresults/arxiv/" + encodeURIComponent(arxiv))
    .then(r => r.json())
    .then(d => {
      if (d.busy && attempt < 12) {
        kr.textContent = "Generating key results — the server is busy, retrying…";
        setTimeout(() => loadKeyResults(base, arxiv, kr, attempt + 1), 8000);
      } else {
        renderKeyResults(kr, d);
      }
    })
    .catch(() => { kr.textContent = "Could not load key results."; });
}

function renderKeyResults(kr, d) {
  kr.innerHTML = "";
  if (d.keyResults && d.keyResults.length) {
    const ul = document.createElement("ul"); ul.className = "kr-list";
    d.keyResults.forEach(t => { const li = document.createElement("li"); li.textContent = t; ul.appendChild(li); });
    kr.appendChild(ul);
  } else if (d.busy) {
    kr.textContent = "Server busy — reopen this paper in a moment.";
  } else if (d.error) {
    kr.textContent = "Key results unavailable for this paper.";
  } else {
    kr.textContent = "—";
  }
}

// Full-screen PDF preview overlay (opened by Preview buttons on the card and detail view).
function openPdfOverlay(arxivId) {
  const base = apiBase();
  if (!base) { window.open("https://arxiv.org/pdf/" + arxivId, "_blank"); return; }
  document.getElementById("po-title").textContent = "arXiv:" + arxivId;
  document.getElementById("po-open").href = "https://arxiv.org/abs/" + arxivId;
  document.getElementById("po-frame").src = base + "/pdf/arxiv/" + encodeURIComponent(arxivId);
  document.getElementById("pdf-overlay").classList.add("open");
}
function closePdfOverlay() {
  document.getElementById("pdf-overlay").classList.remove("open");
  document.getElementById("po-frame").src = "about:blank";
}
function openFig(url, caption) {
  const lb = document.getElementById("fig-lightbox");
  lb.querySelector("img").src = url;
  const cap = document.getElementById("fig-caption");
  cap.textContent = caption || "";
  cap.style.display = caption ? "" : "none";
  lb.classList.add("open");
}
function closeFig() { document.getElementById("fig-lightbox").classList.remove("open"); }
document.getElementById("po-close").addEventListener("click", closePdfOverlay);
document.getElementById("fig-close").addEventListener("click", closeFig);
document.getElementById("fig-lightbox").addEventListener("click", e => { if (e.target.id === "fig-lightbox") closeFig(); });
document.addEventListener("keydown", e => {
  if (e.key !== "Escape") return;
  if (document.getElementById("fig-lightbox").classList.contains("open")) closeFig();
  else if (document.getElementById("pdf-overlay").classList.contains("open")) closePdfOverlay();
});

function closePanel() {
  document.getElementById("info-panel").classList.remove("open");
}

function navigateToNode(id) {
  const n = nodeById.get(id);
  if (n) showPanel(n);
}

svg.on("click", () => {
  closePanel();
  if (typeof searchResults !== "undefined" && searchResults) searchResults.classList.remove("show");
});

// ============================================================
// Filters
// ============================================================

let activeFilter = "all";
// searchSpec.mode: "any" (free text) | "firstAuthor" (papers whose 1st author matches)
let searchSpec = { mode: "any", text: "" };

function myLevel(d) {
  if (d.papers.some(p => p.me === "first")) return "first";
  if (d.papers.some(p => p.me === "coauthor")) return "coauthor";
  return null;
}

// Parse special prefixes, e.g. "first author: Lotov" / "first: Lotov".
function parseQuery(raw) {
  const m = raw.match(/^\s*first(?:\s*author)?\s*:\s*(.*)$/i);
  if (m) return { mode: "firstAuthor", text: m[1].trim().toLowerCase() };
  return { mode: "any", text: raw.trim().toLowerCase() };
}

function firstAuthorOf(p) {
  return (p.authors || "").split(",")[0].trim().toLowerCase();
}

function paperMatches(p) {
  if (searchSpec.mode === "firstAuthor") {
    return firstAuthorOf(p).includes(searchSpec.text);
  }
  return (p.title + " " + p.ref + " " + (p.authors || "")).toLowerCase().includes(searchSpec.text);
}

function matchesSearch(d) {
  if (!searchSpec.text) return true;
  if (searchSpec.mode === "any") {
    if (labelText(d).toLowerCase().includes(searchSpec.text)) return true;
    if (d.description && d.description.toLowerCase().includes(searchSpec.text)) return true;
    if (d.tags.some(t => t.toLowerCase().includes(searchSpec.text))) return true;
  }
  return d.papers.some(paperMatches);
}

function filterNodeOpacity(d) {
  const f = activeFilter;
  if (f === "all") return 1;
  if (f === "unsolved") return d.status === "unsolved" || d.status === "partial" ? 1 : 0.1;
  if (f === "my") {
    const lvl = myLevel(d);
    if (lvl === "first") return 1;
    if (lvl === "coauthor") return 0.55;
    return 0.08;
  }
  return d.tags.includes(f) ? 1 : 0.1;
}

function filterLinkOpacity(l) {
  const f = activeFilter;
  if (f === "all") return 1;
  const s = l.source, t = l.target;
  if (f === "unsolved") {
    return (s.status === "unsolved" || s.status === "partial" || t.status === "unsolved" || t.status === "partial") ? 1 : 0.05;
  }
  if (f === "my") {
    return (myLevel(s) || myLevel(t)) ? 1 : 0.03;
  }
  return (s.tags && s.tags.includes(f) && t.tags && t.tags.includes(f)) ? 1 : 0.05;
}

// View opacity: search (when active) takes priority over the active filter.
function viewNodeOpacity(d) {
  if (searchSpec.text) return matchesSearch(d) ? 1 : 0.1;
  return filterNodeOpacity(d);
}
function viewLinkOpacity(l) {
  if (searchSpec.text) return (matchesSearch(l.source) && matchesSearch(l.target)) ? 1 : 0.04;
  return filterLinkOpacity(l);
}

function applyFilter(duration) {
  node.transition().duration(duration).attr("opacity", viewNodeOpacity);
  link.transition().duration(duration)
    .attr("stroke", baseLinkStroke())
    .attr("stroke-width", baseLinkWidth())
    .attr("stroke-opacity", viewLinkOpacity);
}

document.querySelectorAll(".filter-btn[data-filter]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn[data-filter]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    clearSearch();
    applyFilter(400);
  });
});

// ============================================================
// Search
// ============================================================

const searchInput = document.getElementById("search-input");
const searchResults = document.getElementById("search-results");
let currentMatches = [];
let activeResultIdx = -1;

function focusNode(d) {
  const t = d3.zoomIdentity
    .translate(window.innerWidth / 2, window.innerHeight / 2)
    .scale(1.3)
    .translate(-d.x, -d.y);
  svg.transition().duration(600).call(zoom.transform, t);
  showPanel(d);
}

function matchingPapers(d) {
  if (!searchSpec.text) return [];
  return d.papers.filter(paperMatches);
}

function escapeHtml(s) {
  return s.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

function renderResults() {
  if (!searchSpec.text) {
    searchResults.classList.remove("show");
    searchResults.innerHTML = "";
    return;
  }
  currentMatches = data.nodes
    .filter(matchesSearch)
    .sort((a, b) => a.rank - b.rank || labelText(a).localeCompare(labelText(b)))
    .slice(0, 8);

  if (!currentMatches.length) {
    searchResults.innerHTML = `<div class="search-result" style="color:#64748b;cursor:default">No matches</div>`;
    searchResults.classList.add("show");
    return;
  }
  searchResults.innerHTML = currentMatches.map((d, i) => {
    const papersHtml = matchingPapers(d).map(p => {
      const inner = `${escapeHtml(p.title)}<br><span class="sr-paper-ref">${escapeHtml(p.ref)}</span>`;
      return p.doi
        ? `<a class="sr-paper" href="https://doi.org/${p.doi}" target="_blank" rel="noopener">${inner}</a>`
        : `<span class="sr-paper">${inner}</span>`;
    }).join("");
    return `<div class="search-result${i === activeResultIdx ? " active" : ""}" data-idx="${i}">
       <div class="sr-head">
         <div class="sr-dot" style="background:${statusColors[d.status]}"></div>
         ${labelText(d)}
         <span class="sr-sub">rank ${d.rank}</span>
       </div>
       ${papersHtml ? `<div class="sr-papers">${papersHtml}</div>` : ""}
     </div>`;
  }).join("");
  searchResults.classList.add("show");
  // Clicking a result focuses the node; clicking a paper link opens its DOI.
  searchResults.querySelectorAll(".search-result[data-idx]").forEach(el => {
    el.querySelector(".sr-head").addEventListener("click", () => selectResult(+el.dataset.idx));
  });
  searchResults.querySelectorAll(".sr-paper").forEach(el => {
    el.addEventListener("click", e => e.stopPropagation());
  });
}

function selectResult(i) {
  const d = currentMatches[i];
  if (!d) return;
  focusNode(d);
  searchResults.classList.remove("show");
}

function clearSearch() {
  searchSpec = { mode: "any", text: "" };
  searchInput.value = "";
  currentMatches = [];
  activeResultIdx = -1;
  renderResults();
}

searchInput.addEventListener("input", () => {
  searchSpec = parseQuery(searchInput.value);
  activeResultIdx = -1;
  applyFilter(200);
  renderResults();
});

searchInput.addEventListener("keydown", (e) => {
  if (e.key === "ArrowDown") {
    e.preventDefault();
    activeResultIdx = Math.min(activeResultIdx + 1, currentMatches.length - 1);
    renderResults();
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    activeResultIdx = Math.max(activeResultIdx - 1, 0);
    renderResults();
  } else if (e.key === "Enter") {
    selectResult(activeResultIdx >= 0 ? activeResultIdx : 0);
  } else if (e.key === "Escape") {
    clearSearch();
    applyFilter(200);
    searchInput.blur();
  }
});

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `${r},${g},${b}`;
}

// ============================================================
// Layout toggle (force <-> tree)
// ============================================================

let currentLayout = "force";

function treePositions() {
  const t = d3.zoomTransform(svg.node());
  const w = window.innerWidth;
  const h = window.innerHeight;
  const maxRank = d3.max(data.nodes, d => d.rank);
  const rowSpacing = Math.min(160, (h - 160) / (maxRank + 1));
  const yStart = 100;
  const byRank = {};
  data.nodes.forEach(d => {
    (byRank[d.rank] = byRank[d.rank] || []).push(d);
  });
  const positions = {};
  for (const [rank, nodes] of Object.entries(byRank)) {
    const y = yStart + (+rank) * rowSpacing;
    const gap = w / (nodes.length + 1);
    nodes.forEach((n, i) => {
      // Map screen coords to graph space so the tree fills the current viewport.
      const [gx, gy] = t.invert([gap * (i + 1), y]);
      positions[n.id] = { x: gx, y: gy };
    });
  }
  return positions;
}

function switchToTree() {
  const pos = treePositions();
  simulation
    .force("link", null)
    .force("center", null)
    .force("x", null)
    .force("y", null)
    .force("charge", d3.forceManyBody().strength(-20))
    .force("treeX", d3.forceX(d => pos[d.id].x).strength(0.15))
    .force("treeY", d3.forceY(d => pos[d.id].y).strength(0.15))
    .alpha(0.6).alphaDecay(0.015).alphaTarget(0).restart();
}

function switchToForce() {
  data.nodes.forEach(d => { d.fx = null; d.fy = null; });
  applyForceLayout();
  simulation.alpha(0.6).alphaDecay(0.015).alphaTarget(0).restart();
  scheduleFit(1500);
}

document.getElementById("layout-toggle").addEventListener("click", function() {
  if (currentLayout === "force") {
    currentLayout = "tree";
    this.textContent = "Graph View";
    this.classList.add("active");
    switchToTree();
  } else {
    currentLayout = "force";
    this.textContent = "Tree View";
    this.classList.remove("active");
    switchToForce();
  }
});

// ============================================================
// Resize
// ============================================================

window.addEventListener("resize", () => {
  svg.attr("width", window.innerWidth).attr("height", window.innerHeight);
  if (currentLayout === "force") {
    fitToView(300);
  } else {
    switchToTree();
  }
});

// ============================================================
// Build / rebuild (called initially and after every edit)
// ============================================================

function rebuild({ reheat = true } = {}) {
  deriveData();
  simulation.nodes(data.nodes);
  renderGraph();
  applyFilter(0);
  if (currentLayout === "tree") {
    switchToTree();
  } else if (reheat) {
    applyForceLayout();
    simulation.alpha(0.5).alphaDecay(0.0228).restart();
    scheduleFit(1500);
  } else {
    applyForceLayout();
    scheduleFit(250);
  }
  // Position new/changed elements immediately (covers reheat:false, where no
  // tick fires — e.g. a freshly added link would otherwise sit at 0,0).
  updatePositions();
}

// API surface for editor.js (separate script, shared global scope).
window.graphApi = {
  get topics() { return topics; },
  get papers() { return papers; },
  get data() { return data; },
  get nodeById() { return nodeById; },
  get node() { return node; },
  get link() { return link; },
  get currentLayout() { return currentLayout; },
  rebuild, renderGraph, deriveData,
  showPanel, closePanel, focusNode, applyFilter,
  statusColors, labelText,
  svg, g, zoom, simulation,
};

// Initial draw.
rebuild();
pulseLoop();
</script>
<script src="config.js"></script>
<script src="editor.js"></script>
